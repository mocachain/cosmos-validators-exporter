name: test
on: [push]
jobs:
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-go@v2
        with:
          go-version: '^1.25.8'
      - run: go version
      - run: go mod download
      - run: go build ./cmd/cosmos-validators-exporter.go
  go-vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-go@v2
        with:
          go-version: '^1.25.8'
      - run: go version
      - run: go mod download
      - run: go vet ./...
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout 300s
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v2
        with:
          go-version: '1.25.8'
      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
      - name: Run tests
        run: go test -coverpkg=./... -coverprofile coverage.txt -v ./...
      # Upstream uploads coverage to QuokkaStake's Codecov project. This
      # fork has no Codecov integration. Dropping the step also avoids
      # transient codecov uploader failures (gpg verify EPIPE / 5xx)
      # from masking a green test run.
